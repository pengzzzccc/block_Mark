services:
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - '3001:3001'
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'

volumes:
  redis-data:
